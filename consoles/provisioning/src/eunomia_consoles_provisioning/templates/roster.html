{% extends "base.html" %}
{% block title %}Provisioning Console — Operator Roster{% endblock %}
{% block content %}
<h1>Operator Roster</h1>

<div class="card">
    <h2>Add / Update Person</h2>
    <div class="grid-2">
        <div>
            <label for="person_id">Person ID</label>
            <input type="text" id="person_id" name="person_id" placeholder="op-042">
        </div>
        <div>
            <label for="person_name">Name</label>
            <input type="text" id="person_name" name="name" placeholder="Ana Ramirez">
        </div>
    </div>
    <div class="grid-2">
        <div>
            <label for="person_role">Role</label>
            <select id="person_role" name="role">
                <option value="operator">Operator</option>
                <option value="lead">Lead</option>
                <option value="supervisor">Supervisor</option>
            </select>
        </div>
        <div>
            <label for="roster_site_id">Site ID</label>
            <input type="text" id="roster_site_id" name="site_id" placeholder="mx_santafe_office_1">
        </div>
    </div>
    <p><em>The roster feeds the fob's CONFIRM_ID screen ("&iquest;eres t&uacute;?"). Fob-pull endpoint is a follow-on.</em></p>
</div>
{% endblock %}

<div class="stats-grid">
    <div class="stat-card">
        <div class="value">{{ stats.episodes_today }}</div>
        <div class="label">Episodes Today</div>
        <div class="sub">wk: {{ stats.episodes_week }} / mo: {{ stats.episodes_month }}</div>
    </div>
    <div class="stat-card">
        <div class="value">{{ stats.hours_today }}</div>
        <div class="label">Hours Today</div>
        <div class="sub">wk: {{ stats.hours_week }} / mo: {{ stats.hours_month }}</div>
    </div>
    <div class="stat-card">
        <div class="value">{{ stats.operators_active }}</div>
        <div class="label">Operators Active</div>
    </div>
    <div class="stat-card">
        <div class="value">{{ stats.kits_in_use }}</div>
        <div class="label">Kits in Use</div>
    </div>
</div>

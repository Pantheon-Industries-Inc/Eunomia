name: gates

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # The five Python gates — IDENTICAL to Hermes (same commands, same order). The
  # codegen-drift check is an additional step at the end of this job (OQ-4/OQ-7).
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --frozen --all-packages
      - run: uv run pytest
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy .
      - run: uv run lint-imports
      - name: codegen drift
        # `make drift` == `make codegen` (generate under pinned codegen deps + ruff-format the
        # generated Python) then assert no diff. Single source of truth, local == CI (OQ-6).
        run: make drift

  # C++ / conformance. ALL BLOCKING since Run F2 landed transport/: clang-format, the off-target
  # native build/test, BOTH on-target builds (esp32 headless + cyd deployment board), clang-tidy
  # (scoped to core/ + transport/proto/ since Run F3 — FLAG-F), and the camera-image checksum.
  cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install clang-format + clang-tidy (PINNED — local == CI)
        # Pinned LLVM wheels, NOT unpinned apt: ubuntu's apt clang-format drifts by runner image and
        # disagrees with local (e.g. brace spacing + UTF-8 trailing-comment alignment), breaking the
        # "local == CI" invariant. Pinning to the same 22.x the repo formats with makes the gate
        # deterministic. clang-tidy is REQUIRED — gates-cpp-tidy hard-fails (does not skip) in CI if
        # the binary is absent, so a missing install can never let the blocking gate silently pass.
        run: |
          pipx install clang-format==22.1.5
          pipx install clang-tidy==22.1.7
      - name: install platformio
        run: pipx install platformio
      - name: clang-format (blocking, per-file)
        # PER-FILE via xargs -n1: a clang-format-22 multi-file --dry-run quirk lists every file +
        # exits 1 even when clean; per-file is correct on every version and stays blocking on a real
        # violation. transport/vendor/ (Victor's reference source) is pruned — never reformatted.
        run: printf '%s\n' $(find firmware -path '*/.pio' -prune -o -path '*/vendor/*' -prune -o \( -name '*.cpp' -o -name '*.cc' -o -name '*.h' -o -name '*.hpp' \) -print) | xargs -P4 -n1 clang-format --dry-run -Werror --style=file
      - name: native build + test (blocking)
        run: pio test -e native -d firmware/coordinator
      - name: esp32 target build (blocking)
        run: pio run -e esp32 -d firmware/coordinator
      - name: cyd deployment-board build (blocking)
        run: pio run -e cyd -d firmware/coordinator
      - name: clang-tidy (blocking, scoped core/ + transport/proto/)
        # CI=true is set by GitHub Actions; gates-cpp-tidy runs clang-tidy when present and HARD-FAILS
        # (exit 1) if it is absent under CI — never a silent skip.
        run: make gates-cpp-tidy
      - name: camera-image checksum (stub, blocking)
        run: python3 firmware/camera-image/checksum_gate.py

  # DB-backed edge/store tests (Run S1). The default `gates` job needs no database; these run against
  # a Postgres SERVICE container. The test harness (conftest.py) applies the Alembic migration, so the
  # roles/grants + insert-only audit triggers (NOTE prod-bar b/c) are exercised, not just the tables.
  store-db:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: eunomia
          POSTGRES_DB: eunomia_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --frozen --all-packages
      - name: DB-backed store tests (-m db)
        env:
          EUNOMIA_STORE_TEST_DSN: postgresql+psycopg://postgres:eunomia@localhost:5432/eunomia_test
        run: uv run pytest edge/store -m db

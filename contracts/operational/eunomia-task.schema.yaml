# Eunomia operational entity — task (the versioned task menu).
#
# AUTHORITY: docs/CONTRACT.md §3.1 (task) + §3.5 (task precedence). task_id, task_name, prompt,
# rotation_id, station_id. Carries ONLY task fields, never identity (the clean-separation principle).
#
# VERSIONED (OQ-6): a prompt can change; episodes resolve the prompt AS-OF recorded_at. `version` is
# the version axis; effective_from/effective_to is the version's validity range. The resolver is a
# later run (documented, not implemented).
#
# CATALOG (Run 0e; DECISION_REGISTER 2026-06-25 "Task-setup flow"): the stored, global, versioned menu.
# A task carries ONE-OR-MORE PROMPT VARIANTS selected by `rotation_id` — modeled as ROWS sharing
# `task_id`, differing by `rotation_id` (stays in-DSL; no array-of-objects). The NATURAL KEY is
# (task_id, version, rotation_id); the EPISODE pins all three (episode.task_id + task_version +
# rotation_id) so editing the catalog never retroactively changes a past episode. `task_id` is stable +
# GLOBAL (Fold-Towel = its prompt everywhere). LEGACY: `station_id` below is the OLD hardcoded station↔
# task coupling — now SUPERSEDED by the time-ranged eunomia-task-station-assignment entity (the
# authoritative link). Kept for additive-safety (§5: never remove a field), documented as
# non-authoritative; do not resolve a task's station through it.
#
# TASK PRECEDENCE (§3.5, documented — NOT a single-record rule): NAND pantheon_current_task.env →
# overridden by SD current_assignment.env → else none → the order-join supplies station/prompt at
# ingest. `task_source` (nand_staged|sd_assignment|none) already lives on the sidecar; it records which
# won. TARGETS: [jsonschema, python].

schema: eunomia-task/v1
title: Task
description: A versioned task-menu entry (prompt resolved as-of recording) — CONTRACT §3.1/§3.5.
targets: [jsonschema, python]

fields:
  - name: schema
    type: string
    required: hard
    enum: [eunomia-task/v1]
    description: Schema identifier; additive semver (§5).
  - name: task_id
    type: string
    required: hard
    non_empty: true
    description: The task identity (the anchor).
  - name: version
    type: int
    required: warn
    description: Task version axis (a prompt change is a new version; resolved as-of recorded_at, OQ-6).
  - name: task_name
    type: string
    required: warn
    description: Human task name.
  - name: prompt
    type: string
    required: warn
    description: Task prompt (versioned; resolved as-of recording).
  - name: rotation_id
    type: string
    required: warn
    description: Rotation identity.
  - name: station_id
    type: string
    required: warn
    description: LEGACY — the old hardcoded station↔task coupling. SUPERSEDED by eunomia-task-station-assignment (the authoritative link). Kept additive (§5); non-authoritative.
  - name: category
    type: string
    required: warn
    nullable: true
    description: Task category (open string; structured attribute).
  - name: family
    type: string
    required: warn
    nullable: true
    description: Task family within a category (e.g. "lift_blocks" under "direct_manipulation"). Optional grouping for parametric task variants.
  - name: bimanual
    type: bool
    required: warn
    description: Whether the task is bimanual.
  - name: expected_duration_s
    type: number
    required: warn
    nullable: true
    description: Expected duration in seconds.
  - name: effective_from
    type: string
    required: warn
    nullable: true
    description: Start of this version's validity (OQ-6).
  - name: metadata
    type: object
    required: warn
    nullable: true
    description: Flexible operational metadata for the task. Convention — props (list of required objects), scene_setup (description of table arrangement before recording), reference_dataset (name of existing dataset this task matches), reference_episodes (list of episode IDs from that dataset), object_count (number of objects involved), difficulty (complexity estimate), rubric_checks (array of per-task quality check definitions for QC — each with id, name, category, non_negotiable, measure_method, pass_condition).
  - name: effective_to
    type: string
    required: warn
    nullable: true
    description: End of validity; null = current (OQ-6).

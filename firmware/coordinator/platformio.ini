; Eunomia coordinator firmware (ESP32) — Run F2: coordinator/transport/ lands (ui/ in F3).
;
; Environments:
;   native — the OFF-TARGET host build + unit tests (the one-machine rule -> default to host/mock).
;            Builds core/ + the PURE transport/proto/ (framework-free); the native tests drive mocks
;            of the transport seams (Conn/Delayer/EnvProvider) — the two-hard-rules + seam-conformance
;            proof with NO rig. BLOCKING.
;   esp32  — the on-target HEADLESS build (no TFT): core/ + ALL of transport/ (proto + the Arduino hw
;            bindings + the headless app glue). The trigger/transport path runs from the BOOT button +
;            serial, exactly as Victor's esp32dev headless build does — so transport is validatable
;            before ui/ (F3) exists. BLOCKING (F1 OQ-3).
;   cyd    — the DEPLOYMENT board (ESP32-2432S028R "CYD"): same headless transport firmware as esp32
;            but on the deployment partition table (min_spiffs, dual app slots -> OTA-capable). The TFT
;            screen + touch land in F3 (PANTHEON_HAS_TFT). BLOCKING (the deployment board must build).
;
; transport/vendor/ (Victor's vendored main.cpp + platformio.ini) is REFERENCE-ONLY and is NEVER
; compiled — explicitly excluded from the esp32/cyd src filters below. core/ stays pure C++17,
; framework-free (-fno-exceptions -fno-rtti); transport/ + ui/ are the Arduino-framework layers.

[platformio]
default_envs = native

; ---- common to every env: -std + the core/proto/contract include paths ----
[env]
; Compile project sources (src/ + core/ + transport/proto/ via the filter) into the TEST program too.
test_build_src = yes
; transport/hw/ is pulled via build_src_filter from OUTSIDE src/, so the default `chain` LDF (which
; only follows #includes reachable from src/) never sees its <WiFi.h>/<Preferences.h> includes. deep+
; scans every compiled source so the bundled arduino-esp32 libs (WiFi, Preferences) resolve. (native
; pulls no Arduino libs, so this is a no-op there.)
lib_ldf_mode = deep+
build_flags =
    -std=c++17
    -I${PROJECT_DIR}/core
    -I${PROJECT_DIR}/transport/proto
    -I${PROJECT_DIR}/../../contracts/_generated/cpp

; ---- native: core/ + pure transport/proto/ only (NO Arduino hw) ----
[env:native]
platform = native
test_framework = unity
build_src_filter = +<*> +<../core/> +<../transport/proto/>
build_flags =
    ${env.build_flags}
    -DUNITY_INCLUDE_DOUBLE
    -DEUNOMIA_FIXTURES_DIR=\"${PROJECT_DIR}/../../contracts/conformance/fixtures\"

; ---- esp32: on-target HEADLESS — core/ + ALL transport/ (proto + hw + app), vendor EXCLUDED ----
[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
build_src_filter = +<*> +<../core/> +<../transport/> -<../transport/vendor/>
build_flags =
    ${env.build_flags}
    -I${PROJECT_DIR}/transport/hw
    -fno-exceptions
    -fno-rtti

; ---- cyd: the deployment board (ESP32-2432S028R) — headless transport on the min_spiffs partition ----
; Same firmware as esp32 (headless in F2); only the partition table differs (dual app slots for OTA +
; the layout F3's TFT build will keep, so adding the screen won't change the partition table / wipe
; NVS). The CYD TFT_eSPI deps + pin flags land in F3 with PANTHEON_HAS_TFT.
[env:cyd]
platform = espressif32
board = esp32dev
framework = arduino
board_build.partitions = min_spiffs.csv
build_src_filter = +<*> +<../core/> +<../transport/> -<../transport/vendor/>
build_flags =
    ${env.build_flags}
    -I${PROJECT_DIR}/transport/hw
    -fno-exceptions
    -fno-rtti

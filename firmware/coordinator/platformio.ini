; Eunomia coordinator firmware (ESP32) — Run 0a build shell.
;
; Two environments:
;   native — the OFF-TARGET host build + unit tests (the firmware core must be testable
;            with NO hardware; the one-machine rule -> default to the host/mock path).
;            BLOCKING gate in Run 0a.
;   esp32  — the on-target build. PRESENT but NON-BLOCKING in Run 0a (flips to blocking
;            when coordinator/core/ lands). Per OQ-13.
;
; Both pull the contract types from the GENERATED C++ header (the dependency law:
; firmware depends only on contracts/). firmware/ is outside the Python import-linter;
; its boundary is this include path + the conformance gate.

[platformio]
default_envs = native

[env:native]
platform = native
test_framework = unity
build_flags =
    -std=c++17
    -DUNITY_INCLUDE_DOUBLE
    -I${PROJECT_DIR}/../../contracts/_generated/cpp
    -DEUNOMIA_FIXTURES_DIR=\"${PROJECT_DIR}/../../contracts/conformance/fixtures/ping\"

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
build_flags =
    -I${PROJECT_DIR}/../../contracts/_generated/cpp

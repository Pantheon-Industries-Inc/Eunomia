; Eunomia coordinator firmware (ESP32) — Run F1: coordinator/core/ landed.
;
; Two environments:
;   native — the OFF-TARGET host build + unit tests (the firmware core must be testable
;            with NO hardware; the one-machine rule -> default to the host/mock path).
;            BLOCKING gate.
;   esp32  — the on-target build. Now BLOCKING (Run F1, OQ-3): core/ is pure C++17 and must
;            cross-compile clean for the ESP32 it will run on. core/ is written to ESP32
;            constraints — no C++ exceptions, no RTTI, heap-aware — enforced here by
;            -fno-exceptions -fno-rtti so a violation is a build failure, not a silent runtime trap.
;
; Both pull the contract types from the GENERATED C++ header (the dependency law: firmware depends
; only on contracts/). core/ is compiled into both envs via build_src_filter (+<../core/>); it
; depends only on contracts/ + its own injected seams. firmware/ is outside the Python import-linter;
; its boundary is this include path + the conformance gate.

[platformio]
default_envs = native

; ---- common to every env: pull in core/ + the generated contract headers ----
[env]
; Compile the project sources (src/ + core/ via the filter) into the TEST program too — by default
; `pio test` builds only the test files + libs, so core/ would not link (test_build_src fixes that).
test_build_src = yes
build_src_filter = +<*> +<../core/>
build_flags =
    -std=c++17
    -I${PROJECT_DIR}/core
    -I${PROJECT_DIR}/../../contracts/_generated/cpp

[env:native]
platform = native
test_framework = unity
build_flags =
    ${env.build_flags}
    -DUNITY_INCLUDE_DOUBLE
    -DEUNOMIA_FIXTURES_DIR=\"${PROJECT_DIR}/../../contracts/conformance/fixtures\"

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
build_flags =
    ${env.build_flags}
    -fno-exceptions
    -fno-rtti

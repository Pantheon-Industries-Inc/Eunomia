; PlatformIO project for the Pantheon X3 WiFi-OSC fob (ESP32 camera coordinator).
;
; Target hardware: any ESP32 dev board.  The default build is for the
; common ESP32-WROOM-32 ("esp32dev").  For an LiPo-backed pocket fob you
; probably want an ESP32-C3 SuperMini or LilyGO T-Display-S3 - flip the
; default_envs accordingly.  All envs build the same firmware code; the
; only deltas are GPIO pin assignments (set via build_flags).
;
; Default hardware is the CYD (ESP32-2432S028R, 2.8" TFT). The bare commands
; below hit the default_envs (=cyd) so they Just Work on the real fob:
; Build:
;     pio run
; Flash:
;     pio run -t upload      (then RE-PROVISION: env switch wipes NVS)
; Monitor:
;     pio device monitor -b 115200
; Override with `-e esp32dev` ONLY for a bare WROOM dev board (no screen).

[platformio]
; The deployment fob hardware is the ESP32-2432S028R "CYD" (2.8" TFT + touch).
; default_envs MUST be `cyd` so a bare `pio run -t upload` ALWAYS flashes the
; screen+UI build. Flashing `esp32dev` (no TFT) yields a BLACK SCREEN / no UI and
; has burned us before. Only override (`-e esp32dev`) for a bare WROOM dev board.
; NOTE: cyd uses the min_spiffs partition table; switching envs WIPES NVS, so
; always RE-PROVISION (tools/provision.py) after changing the flashed env.
default_envs = cyd

[env]
framework = arduino
monitor_speed = 115200
; CYD (ESP32-2432S028R) CH340 cannot reliably sustain 921600 (serial noise). And
; 460800 ALSO drops on some Macs/cables - it died mid-write at ~94% ("chip stopped
; responding") during a field setup 2026-06-24, leaving a half-written app (looks
; "bricked" but the bootloader is intact -> just re-flash). 115200 is slower (~60s)
; but held solidly where 460800 failed. Reliability > speed for field flashing.
upload_speed = 115200
; WiFi-OSC build: the fob talks to the cameras over WiFi (OSC HTTP on :80 +
; passwordless busybox telnet on :23), so there is NO BLE stack anymore - the
; single 2.4GHz radio is dedicated to STA mode (camera hub AP + brief uplink
; borrow). HTTPClient/WiFiClientSecure come from the arduino-esp32 core.
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    bblanchon/ArduinoJson@^7.0.4
; LittleFS holds the trigger-episode log (/episodes.jsonl). The default ESP32
; partition table includes a data partition LittleFS.begin(true) formats on
; first boot; this line makes `pio run -t uploadfs` use LittleFS too.
board_build.filesystem = littlefs

; ----- ESP32-WROOM-32 (default dev board) -----
[env:esp32dev]
platform = espressif32@^6.5.0
board = esp32dev
build_flags =
    -DPANTHEON_FOB_BUILD=1
    -DPANTHEON_PIN_BUTTON=0       ; BOOT button on most ESP32 dev boards
    -DPANTHEON_PIN_LED=2          ; built-in LED on most ESP32 dev boards

; ----- ESP32-2432S028R "CYD" (Cheap Yellow Display: 2.8" 320x240 ILI9341 + touch) -----
; The migration target. Classic ESP32-WROOM (board=esp32dev) with an onboard
; TFT. NOTE the 2-USB-port CYD variant uses the ILI9341_2 driver and may show
; inverted colors (fix at runtime with tft.invertDisplay(true) if needed).
; GPIO2 is the TFT DC line, so the status LED is moved OFF GPIO2 to the CYD's
; red RGB-LED leg (GPIO4).
[env:cyd]
platform = espressif32@^6.5.0
board = esp32dev
; WiFi + TLS + TFT fits the default 1.31MB app partition, but min_spiffs gives
; 1.9MB app partitions with comfortable headroom AND keeps dual app slots so OTA
; stays possible. The episode log is KB-sized so the smaller LittleFS is fine.
board_build.partitions = min_spiffs.csv
build_flags =
    -DPANTHEON_FOB_BUILD=1
    -DPANTHEON_HAS_TFT=1
    -DPANTHEON_PIN_BUTTON=0        ; BOOT button (GPIO0) on the CYD
    -DPANTHEON_PIN_LED=4           ; CYD red RGB-LED leg (GPIO2 = TFT DC, do NOT use)
    ; --- TASK 5 per-cam telemetry (battery % + SD free) over BLE ---
    ; TWO independent gates, BOTH OFF by default:
    ;   -DPANTHEON_TELEM_RELAY=1  enables the idle POST /api/cam-telemetry cadence
    ;     (ships online/recording presence live). Safe to enable now that WiFi runs
    ;     on the core-0 worker (it no longer blocks the touch loop). Without this
    ;     the fob sends NO telemetry at all.
    ;   -DPANTHEON_TELEM_BLE=1    additionally compiles the BE80 GET_OPTIONS/
    ;     GET_CAPTURE_STATUS client poll that fills battery_pct / sd_free. That poll
    ;     is UNVERIFIED on hardware and STUBBED (returns false); battery/SD stay -1
    ;     until the BE82 response byte layout is confirmed on a live cam.
    ; So: presence needs RELAY; battery/SD needs RELAY *and* a verified BLE poll.
    ; -DPANTHEON_TELEM_RELAY=1
    ; -DPANTHEON_TELEM_BLE=1
    ; --- TFT_eSPI display config for the CYD (2-USB-port / ILI9341_2 variant) ---
    -DUSER_SETUP_LOADED=1
    -DILI9341_2_DRIVER=1
    ; COLOUR FIX (do NOT remove): the 2-USB-port ESP32-2432S028R panel driven by
    ; ILI9341_2_DRIVER has red/blue swapped AND needs inversion - WITHOUT these two
    ; flags every colour is fundamentally wrong (green looks red, red looks teal,
    ; etc.). This is the documented combo for this exact board+driver:
    ;   Bodmer/TFT_eSPI issue #2985 / discussion #3018 (same ILI9341_2_DRIVER).
    ; If the background ever turns WHITE, drop -DTFT_INVERSION_ON (panel needs OFF).
    ; If red/blue look swapped, flip TFT_RGB_ORDER between TFT_BGR and TFT_RGB.
    -DTFT_RGB_ORDER=TFT_BGR
    -DTFT_INVERSION_ON=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    -DTFT_BACKLIGHT_ON=HIGH
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_GFXFF=1
    -DSPI_FREQUENCY=55000000
    -DSPI_READ_FREQUENCY=20000000

; ----- ESP32-C3 SuperMini (cheap pocket fob) -----
[env:esp32-c3-supermini]
platform = espressif32@^6.5.0
board = esp32-c3-devkitm-1
build_flags =
    -DPANTHEON_FOB_BUILD=1
    -DPANTHEON_PIN_BUTTON=9       ; BOOT button on ESP32-C3 SuperMini
    -DPANTHEON_PIN_LED=8          ; built-in LED (active-low) on C3

; ----- ESP32-S3 (LilyGO T-Display-S3 if you want a screen later) -----
[env:esp32-s3-devkitc-1]
platform = espressif32@^6.5.0
board = esp32-s3-devkitc-1
build_flags =
    -DPANTHEON_FOB_BUILD=1
    -DPANTHEON_PIN_BUTTON=0
    -DPANTHEON_PIN_LED=2

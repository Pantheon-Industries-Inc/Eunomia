# Alembic config for edge/store (Run S1). Run from the edge/store/ directory:
#   cd edge/store && EUNOMIA_STORE_DSN=... uv run alembic upgrade head
# The database URL is NOT stored here — env.py reads it from EUNOMIA_STORE_DSN (the topology seam,
# NOTE F3), so the same migrations apply edge or central, and no credential lives in the repo.
[alembic]
script_location = migrations
prepend_sys_path = .
